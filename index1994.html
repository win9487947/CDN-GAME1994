<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>秘密調查處 - 身分審核系統</title>
    <style>
        /* 引入 Google 字體來模擬像素/復古感 */
        @import url('https://fonts.googleapis.com/css2?family=DotGothic16&display=swap');

        :root {
            --bg-color: #0a0a0a;
            --text-color: #33ff33; /* 經典終端機綠色 */
            --border-color: #aaaaaa;
            --card-bg: #1a1a1a;
            --btn-pass: #28a745;
            --btn-reject: #dc3545;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'DotGothic16', 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* CRT 螢幕掃描線特效 */
        body::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        #game-container {
            background-color: #000;
            border: 4px solid var(--text-color);
            padding: 20px;
            width: 800px;
            max-width: 95%;
            box-shadow: 0 0 20px var(--text-color);
            position: relative;
            z-index: 10;
        }

        header {
            text-align: center;
            border-bottom: 2px dashed var(--text-color);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        h1 {
            margin: 0 0 10px 0;
            font-size: 24px;
            letter-spacing: 2px;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            font-size: 18px;
        }

        #workspace {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 20px;
        }

        /* 文件卡片樣式 */
        .document {
            flex: 1;
            background-color: var(--card-bg);
            border: 4px solid var(--border-color);
            padding: 15px;
            /* 模擬像素邊角 */
            box-shadow: inset -4px -4px 0px rgba(0,0,0,0.5), inset 4px 4px 0px rgba(255,255,255,0.1);
        }

        .document h2 {
            text-align: center;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 5px;
            margin-top: 0;
            color: #fff;
        }

        .data-row {
            margin-bottom: 15px;
            font-size: 18px;
            color: #ddd;
        }

        .data-label {
            color: #888;
            display: inline-block;
            width: 60px;
        }

        .data-value {
            font-weight: bold;
            letter-spacing: 1px;
            color: #fff;
        }

        /* 控制按鈕區 */
        #controls {
            display: flex;
            justify-content: center;
            gap: 40px;
        }

        .btn {
            font-family: inherit;
            font-size: 20px;
            padding: 15px 30px;
            border: 4px solid #fff;
            cursor: pointer;
            font-weight: bold;
            color: #fff;
            text-transform: uppercase;
            position: relative;
            /* 像素按鈕立體感 */
            box-shadow: 4px 4px 0px #000, 6px 6px 0px #fff;
            transition: all 0.1s;
        }

        .btn:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px #000, 2px 2px 0px #fff;
        }

        .btn-pass {
            background-color: var(--btn-pass);
            border-color: #55ff55;
        }

        .btn-reject {
            background-color: var(--btn-reject);
            border-color: #ff5555;
        }

        /* 系統提示訊息 */
        #message-box {
            text-align: center;
            height: 30px;
            font-size: 20px;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .msg-success { color: #55ff55; }
        .msg-error { color: #ff5555; }

        /* 勝利畫面 */
        #victory-screen {
            display: none;
            text-align: center;
            padding: 40px 20px;
        }

        .password-box {
            font-size: 40px;
            color: #ffff33;
            background: #222;
            padding: 20px;
            border: 4px dashed #ffff33;
            display: inline-block;
            margin-top: 20px;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="game-ui">
            <header>
                <h1>秘密調查處 - 幽靈連署審查系統</h1>
                <div class="status-bar">
                    <span>登入審核員：<span style="color: #fff;">陳定南</span></span>
                    <span>成功審核：<span id="score" style="color: #ffff33;">0</span> / 3</span>
                </div>
            </header>

            <div id="message-box">等待審核中...</div>

            <div id="workspace">
                <div class="document">
                    <h2>身分證 (真本)</h2>
                    <div class="data-row">
                        <span class="data-label">姓名:</span>
                        <span class="data-value" id="id-name">讀取中</span>
                    </div>
                    <div class="data-row">
                        <span class="data-label">字號:</span>
                        <span class="data-value" id="id-number">讀取中</span>
                    </div>
                    <div class="data-row">
                        <span class="data-label">生日:</span>
                        <span class="data-value" id="id-dob">讀取中</span>
                    </div>
                </div>

                <div class="document">
                    <h2>送審單據</h2>
                    <div class="data-row">
                        <span class="data-label">姓名:</span>
                        <span class="data-value" id="form-name">讀取中</span>
                    </div>
                    <div class="data-row">
                        <span class="data-label">字號:</span>
                        <span class="data-value" id="form-number">讀取中</span>
                    </div>
                    <div class="data-row">
                        <span class="data-label">生日:</span>
                        <span class="data-value" id="form-dob">讀取中</span>
                    </div>
                </div>
            </div>

            <div id="controls">
                <button class="btn btn-reject" onclick="checkAnswer(false)">不通過 (✗)</button>
                <button class="btn btn-pass" onclick="checkAnswer(true)">通過 (✓)</button>
            </div>
        </div>

        <div id="victory-screen">
            <h1 style="color: #55ff55;">系統解鎖成功！</h1>
            <p style="font-size: 20px; color: #fff;">陳定南長官，您以「誠實與精確」完成了審查。</p>
            <p style="font-size: 18px;">機密檔案解鎖密碼為：</p>
            <div class="password-box">CLEAN_1981</div>
            <br><br>
            <button class="btn btn-pass" onclick="location.reload()" style="font-size: 16px;">重新啟動系統</button>
        </div>
    </div>

    <script>
        // 假資料庫
        const names = ["王大明", "李小華", "陳美麗", "林建國", "張志強", "黃淑芬", "吳家豪", "劉雅婷", "蔡宗翰", "楊欣儀"];
        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";

        // 遊戲狀態
        let score = 0;
        const targetScore = 3;
        let isCurrentMatching = true; 
        
        let currentIDData = {};
        let currentFormData = {};

        // 隨機產生身分證字號
        function generateIDNumber() {
            let id = chars.charAt(Math.floor(Math.random() * chars.length));
            id += (Math.floor(Math.random() * 2) + 1); // 1或2
            for(let i=0; i<8; i++){
                id += Math.floor(Math.random() * 10);
            }
            return id;
        }

        // 隨機產生生日
        function generateDOB() {
            let year = Math.floor(Math.random() * 40) + 1960; // 1960-1999
            let month = Math.floor(Math.random() * 12) + 1;
            let day = Math.floor(Math.random() * 28) + 1; // 簡化處理，最多28天
            return `${year}-${month.toString().padStart(2, '0')}-${day.toString().padStart(2, '0')}`;
        }

        // 產生一組資料
        function generateProfile() {
            return {
                name: names[Math.floor(Math.random() * names.length)],
                idNumber: generateIDNumber(),
                dob: generateDOB()
            };
        }

        // 弄亂資料 (製造不通過的條件)
        function tamperData(data) {
            let tampered = { ...data };
            let tamperType = Math.floor(Math.random() * 3); // 隨機決定弄亂哪一個欄位
            
            if (tamperType === 0) {
                // 弄亂名字 (加個字或改個字)
                tampered.name = tampered.name.substring(0, 2) + "偽"; 
            } else if (tamperType === 1) {
                // 弄亂身分證 (改掉最後一個數字)
                let oldChar = tampered.idNumber.slice(-1);
                let newChar = oldChar === '9' ? '0' : String(parseInt(oldChar) + 1);
                tampered.idNumber = tampered.idNumber.slice(0, -1) + newChar;
            } else {
                // 弄亂生日 (年份加1)
                let parts = tampered.dob.split('-');
                parts[0] = String(parseInt(parts[0]) + 1);
                tampered.dob = parts.join('-');
            }
            return tampered;
        }

        // 初始化新的一回合
        function nextRound() {
            // 產生基準資料 (身分證)
            currentIDData = generateProfile();
            
            // 隨機決定這回合是「一致」還是「不一致」 (50% 機率)
            isCurrentMatching = Math.random() >= 0.5;

            if (isCurrentMatching) {
                currentFormData = { ...currentIDData };
            } else {
                currentFormData = tamperData(currentIDData);
            }

            // 更新畫面
            document.getElementById('id-name').innerText = currentIDData.name;
            document.getElementById('id-number').innerText = currentIDData.idNumber;
            document.getElementById('id-dob').innerText = currentIDData.dob;

            document.getElementById('form-name').innerText = currentFormData.name;
            document.getElementById('form-number').innerText = currentFormData.idNumber;
            document.getElementById('form-dob').innerText = currentFormData.dob;
            
            // 預設訊息
            let msgBox = document.getElementById('message-box');
            msgBox.innerText = "請比對兩側資料...";
            msgBox.className = "";
        }

        // 檢查玩家選擇
        function checkAnswer(playerChoicePass) {
            let msgBox = document.getElementById('message-box');
            
            // 判斷對錯：如果玩家選擇(通過/不通過)與實際是否相符(一致/不一致)相同
            if (playerChoicePass === isCurrentMatching) {
                // 答對了
                score++;
                document.getElementById('score').innerText = score;
                
                if (score >= targetScore) {
                    // 達成目標，顯示密碼
                    document.getElementById('game-ui').classList.add('hidden');
                    document.getElementById('victory-screen').style.display = 'block';
                } else {
                    // 沒達成目標，繼續下一關
                    msgBox.innerText = ">> 判斷正確！進行下一份審核。";
                    msgBox.className = "msg-success";
                    setTimeout(nextRound, 800); // 延遲一下讓玩家看到成功訊息
                }
            } else {
                // 答錯了，扣分或單純提示錯誤
                msgBox.innerText = ">> 判斷錯誤！請仔細比對！";
                msgBox.className = "msg-error";
                // 答錯給予懲罰效果 (螢幕震動)
                document.getElementById('game-container').animate([
                    { transform: 'translateX(0)' },
                    { transform: 'translateX(-10px)' },
                    { transform: 'translateX(10px)' },
                    { transform: 'translateX(0)' }
                ], { duration: 300 });
            }
        }

        // 遊戲載入後啟動第一回合
        window.onload = nextRound;

    </script>
</body>
</html>
